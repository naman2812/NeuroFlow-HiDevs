[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "ASYNC"]
ignore = ["ANN401", "E501", "E722", "E402", "E712", "ASYNC230", "ASYNC240"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["venv", ".venv"]
