services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neuroflow
      POSTGRES_USER: neuroflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits: {memory: 2g, cpus: '2.0'}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "neuroflow"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits: {memory: 512m, cpus: '0.5'}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
    deploy:
      resources:
        limits: {memory: 1g, cpus: '1.0'}
    depends_on: [postgres]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: runtime
    deploy:
      replicas: 2
      resources:
        limits: {memory: 1g, cpus: '1.0'}
    restart: unless-stopped
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    depends_on: [postgres, redis, mlflow]
    env_file: ../.env
    volumes:
      - uploads_data:/app/uploads

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: runtime
    command: python -m arq backend.worker.WorkerSettings
    deploy:
      replicas: 2
      resources:
        limits: {memory: 2g, cpus: '2.0'}
    restart: unless-stopped
    depends_on: [postgres, redis]
    env_file: ../.env
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ../frontend
      target: runtime
    deploy:
      replicas: 2
      resources:
        limits: {memory: 1g, cpus: '1.0'}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [api, frontend]

volumes:
  postgres_data:
  uploads_data:
