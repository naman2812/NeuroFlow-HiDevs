services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neuroflow
      POSTGRES_USER: neuroflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "neuroflow"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
    ports: ["5000:5000"]
    depends_on: [postgres]

  api:
    image: neuroflow-backend:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    depends_on: [postgres, redis, mlflow]
    env_file: ../.env
    volumes:
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    image: neuroflow-backend:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: arq backend.worker.WorkerSettings
    depends_on: [postgres, redis]
    env_file: ../.env
    volumes:
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports: ["16686:16686", "4317:4317"]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
    depends_on: [api]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana:/etc/grafana/dashboards
    depends_on: [prometheus, postgres]

volumes:
  postgres_data:
  uploads_data:
    name: neuroflow_uploads_data
