name: PR Preview Deployments

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-preview:
    name: Deploy PR Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli


      - name: Create or Select PR Environment
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          # Create environment (fails silently if it already exists)
          railway environment create $ENV_NAME || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Backend
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          # Deploy code as a detached service directly to the PR environment
          railway up --service grateful-trust --environment $ENV_NAME --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Inject Environment Prefix Variable
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          railway variables set ENV_PREFIX=$ENV_NAME --environment $ENV_NAME --service grateful-trust
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Comment PR with Deployment URL
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            🚀 **Preview Environment Deployed!**
            The backend API for this PR is spinning up.
            
            It is securely isolated in Postgres schema `pr-${{ github.event.pull_request.number }}` and a dynamic Redis logical database to ensure staging data is not overwritten!
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  teardown-preview:
    name: Teardown PR Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli


      - name: Delete Railway Environment
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          railway environment delete $ENV_NAME --confirm
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          
      - name: Drop Isolated Postgres Schema
        run: |
          # Use psql to connect to the staging database and drop the PR's isolated schema
          sudo apt-get install -y postgresql-client
          psql "$POSTGRES_URL" -c "DROP SCHEMA IF EXISTS \"pr-${{ github.event.pull_request.number }}\" CASCADE;"
        env:
          POSTGRES_URL: ${{ secrets.STAGING_POSTGRES_URL }}
