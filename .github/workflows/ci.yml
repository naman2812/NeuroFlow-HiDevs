name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -r backend/requirements.txt
      - run: pip install ruff mypy types-bleach pandas-stubs
      - run: ruff check backend/ pipelines/ evaluation/ || true
      - run: mypy --explicit-package-bases --ignore-missing-imports backend/ pipelines/ evaluation/ || true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: {POSTGRES_PASSWORD: testpassword, POSTGRES_DB: neuroflow_test}
      redis:
        image: redis:7-alpine
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r backend/requirements.txt
      - name: Run Tests
        env:
          OPENAI_API_KEY: "mock"
          POSTGRES_PASSWORD: "testpassword"
          REDIS_PASSWORD: ""
          POSTGRES_HOST: "localhost"
          REDIS_HOST: "localhost"
        run: python -m pytest tests/unit/ -v --cov=backend --cov=pipelines --cov=evaluation --cov-report=xml
      - uses: codecov/codecov-action@v4
        with: {file: coverage.xml}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install detect-secrets pip-audit
      - run: detect-secrets-hook --baseline .secrets.baseline $(git diff --name-only HEAD~1) || true
      - run: pip-audit -r backend/requirements.txt || true
      - run: npm audit --prefix frontend --audit-level=high || true
